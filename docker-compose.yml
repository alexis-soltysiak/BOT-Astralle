services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      ENV: ${ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-app}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      BACKEND_PROXY_SECRET: ${BACKEND_PROXY_SECRET:-}
      DISCORD_SERVICE_TOKEN: ${DISCORD_SERVICE_TOKEN:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-}
      ADMIN_SESSION_TTL_SECONDS: ${ADMIN_SESSION_TTL_SECONDS:-43200}
      RIOT_API_KEY: ${RIOT_API_KEY:-}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      MATCHES_INGEST_COUNT: ${MATCHES_INGEST_COUNT:-10}
      PUBLICATION_LEASE_SECONDS: ${PUBLICATION_LEASE_SECONDS:-90}
      PUBLICATION_MAX_ATTEMPTS: ${PUBLICATION_MAX_ATTEMPTS:-10}
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID:-}
      DISCORD_LEADERBOARD_CHANNEL_ID: ${DISCORD_LEADERBOARD_CHANNEL_ID:-}
      DISCORD_FINISHED_CHANNEL_ID: ${DISCORD_FINISHED_CHANNEL_ID:-}
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5

  discord:
    build:
      context: ./discord
    restart: unless-stopped
    environment:
      ENV: ${ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID:-}
      BACKEND_BASE_URL: http://backend:8000
      BACKEND_PROXY_SECRET: ${BACKEND_PROXY_SECRET:-}
      DISCORD_SERVICE_TOKEN: ${DISCORD_SERVICE_TOKEN:-}
      DISCORD_CONSUMER_ID: ${DISCORD_CONSUMER_ID:-discord-bot-prod}
      PUBLISH_POLL_INTERVAL_SECONDS: ${PUBLISH_POLL_INTERVAL_SECONDS:-5}
      LIVE_REFRESH_INTERVAL_SECONDS: ${LIVE_REFRESH_INTERVAL_SECONDS:-60}
      LLM_MATCH_ANALYSIS_ENABLED: ${LLM_MATCH_ANALYSIS_ENABLED:-true}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-5-mini}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-12}
      DISCORD_LEADERBOARD_CHANNEL_ID: ${DISCORD_LEADERBOARD_CHANNEL_ID:-}
      DISCORD_LIVE_CHANNEL_ID: ${DISCORD_LIVE_CHANNEL_ID:-}
      DISCORD_FINISHED_CHANNEL_ID: ${DISCORD_FINISHED_CHANNEL_ID:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_BASE_URL: ${NEXT_PUBLIC_BACKEND_BASE_URL:-http://localhost:8000}
    restart: unless-stopped
    environment:
      PORT: 3000
      NEXT_PUBLIC_BACKEND_BASE_URL: ${NEXT_PUBLIC_BACKEND_BASE_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
